<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background-color: rgba(252, 249, 248, 0.8);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005c55 0%, #0f766e 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface min-h-screen selection:bg-primary-fixed">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#FCF9F8]/80 backdrop-blur-md">
<div class="text-lg font-bold text-primary">Commiz</div>
<button class="text-on-surface-variant font-medium hover:bg-surface-container-low px-4 py-2 rounded-xl transition-colors active:scale-95 duration-200">
            Skip
        </button>
</header>
<main class="pt-24 pb-12 px-6 max-w-md mx-auto">
<!-- Illustration Section -->
<div class="mb-10 relative flex justify-center">
<div class="absolute -z-10 w-48 h-48 bg-primary-fixed rounded-full blur-3xl opacity-30"></div>
<img alt="Playful Shiba Inu dog illustration" class="w-48 h-48 object-contain drop-shadow-xl" data-alt="Playful Shiba Inu dog sitting happily" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2pfZqk8RLB5I1j-NYZnN7bSmGdjmSLi-Cr47jqv-MHrQyPe50L_C5EyvUxgzmuRw8PCTjaygSZAc09Om471dMXe0VayNwsWkRSJIiqpC6CDGHr4awHAQHnE6CmVpJQ8RP2cLNGR8CobD96gXuPn-E9rYefqpkk6oSkO7YLKbmdZbMEKk6mD3s3AvFTB_KnATcAsohcuQar531ubMY79tIpFUXI4-7tKm3iT1JPlD-T0P0qhRenu0n4nEi0BkF6nal651O_Iar7Oo"/>
</div>
<!-- Heading Area -->
<div class="mb-8 text-center">
<h1 class="font-headline text-3xl font-semibold tracking-tight text-on-surface mb-2">Chào mừng bạn!</h1>
<p class="text-on-surface-variant text-body-lg">Đăng nhập để tiếp tục cùng Commiz</p>
</div>
<!-- Auth Form -->
<div class="space-y-4">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/30 py-3.5 px-6 rounded-xl hover:bg-surface-container-low transition-all active:scale-[0.98]">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrXwm5FuXaHvz_JEls__GByibFWIhClj5SSESzNT3c-0qXrmkTFCK-8CJBt-H2vvU3gtzPnCjmj6IV8j5JgMgfzAffjOygLyPtievElr7DF1k4jvANgqgAwg5LgIt8vDOvTucQCR2ABYrfUXnM0MZPl7MldRM4EyJokV0dO0sbovpKUNEEYMpgoW7Hk9PQ97SUkAeM48wiBdM3dA_7Bupq-hyHGanJXvomHjuiuuyScab1fh6fnCsv4GiSxhIw0IdzeKidFY8Ssp4"/>
<span class="font-medium text-on-surface">Tiếp tục với Google</span>
</button>
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-label-md text-on-surface-variant">HOẶC</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Inputs -->
<div class="space-y-4">
<div class="group">
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 ml-1">Email</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-fixed rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline outline-none transition-all" placeholder="email@vi-du.com" type="email"/>
</div>
<div class="group">
<label class="block text-label-md font-medium text-on-surface-variant mb-1.5 ml-1">Mật khẩu</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary-fixed rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex justify-end pt-1">
<button class="text-label-md font-medium text-primary hover:underline">Quên mật khẩu?</button>
</div>
<!-- CTA Buttons -->
<div class="pt-4 space-y-3">
<!-- Swapped Primary to Secondary-Style (Dark Teal) -->
<button class="w-full primary-gradient text-white py-4 px-6 rounded-xl font-semibold shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all">
                    Đăng nhập
                </button>
<!-- Swapped Secondary to Primary-Style (Light/Neutral Container) -->
<button class="w-full bg-primary-fixed text-on-primary-fixed py-4 px-6 rounded-xl font-semibold hover:bg-primary-fixed-dim active:scale-[0.98] transition-all">
                    Đăng ký
                </button>
</div>
</div>
<!-- Footer Policy -->
<p class="mt-10 text-center text-label-md text-on-surface-variant px-8 leading-relaxed">
            Bằng cách tiếp tục, bạn đồng ý với <a class="text-primary font-medium" href="#">Điều khoản dịch vụ</a> và <a class="text-primary font-medium" href="#">Chính sách bảo mật</a> của chúng tôi.
        </p>
</main>
<!-- Decorative Bottom Shell (Suppressed Navigation but added tonal depth) -->
<div class="fixed bottom-0 left-0 w-full h-24 bg-gradient-to-t from-surface-container-low to-transparent -z-10"></div>
</body></html>
